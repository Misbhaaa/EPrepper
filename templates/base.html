{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <!-- IMPORTANT FOR MOBILE -->
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>AI Study Planner</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            transition: background 0.4s ease, color 0.4s ease;
        }

        /* ================= DARK MODE ================= */
        body.dark-mode {
            background: linear-gradient(135deg, #1f1f2e, #2b2b45);
            color: #f1f1f1;
        }

        body.dark-mode .navbar {
            background-color: #141423;
        }

        body.dark-mode .navbar-brand,
        body.dark-mode .welcome-text {
            color: #ffffff !important;
        }

        body.dark-mode .card {
            background: #2f2f4f;
            color: #ffffff;
        }

        body.dark-mode a {
            color: #90caf9;
        }

        body.dark-mode a:hover {
            color: #ffffff;
        }

        body.dark-mode .dropdown-menu {
            background-color: #2f2f4f;
        }

        body.dark-mode .dropdown-item {
            color: white;
        }

        body.dark-mode .dropdown-item:hover {
            background-color: #3f3f6f;
        }

        /* ================= LIGHT MODE ================= */
        body.light-mode {
            background: #f4f6fa;
            color: #222222;
        }

        body.light-mode .navbar {
            background-color: #e9ecef;
        }

        body.light-mode .navbar-brand,
        body.light-mode .welcome-text {
            color: #222222 !important;
        }

        body.light-mode .card {
            background: #ffffff;
            color: #222222;
        }

        body.light-mode a {
            color: #0d6efd;
        }

        body.light-mode a:hover {
            color: #0a58ca;
        }

        /* ================= COMMON ================= */

        .card {
            border-radius: 15px;
            border: none;
            transition: 0.3s ease;
        }

        .card:hover {
            transform: translateY(-6px);
            box-shadow: 0px 12px 25px rgba(0, 0, 0, 0.2);
        }

        .btn {
            border-radius: 8px;
            font-weight: 600;
        }

        .progress-bar {
            border-radius: 20px;
        }

        .chart-container {
            width: 100%;
            max-width: 600px;
        }

    </style>
</head>

<body class="dark-mode">

<!-- RESPONSIVE NAVBAR -->
<nav class="navbar navbar-expand-lg">
    <div class="container">

        <!-- Logo -->
        <a class="navbar-brand d-flex align-items-center gap-2" href="{% url 'dashboard' %}">
    <img src="{% static 'images/logo.png' %}" 
         alt="Logo"
         height="40">
    <span class="fw-bold">EPrepper</span>
</a>

        <!-- Mobile Toggle Button -->
        <button class="navbar-toggler" type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarContent">
            <span class="navbar-toggler-icon"></span>
        </button>

        <!-- Right Section -->
        <div class="collapse navbar-collapse justify-content-end"
             id="navbarContent">

            {% if user.is_authenticated %}
            <div class="d-flex flex-column flex-lg-row align-items-lg-center gap-3 mt-3 mt-lg-0">

                <!-- Welcome -->
                <span class="welcome-text fw-semibold">
                    Welcome, {{ user.username }} 👋
                </span>

                <!-- Dashboard button (only when not on dashboard) -->
                {% if request.path != '/dashboard/' %}
                    <a href="{% url 'dashboard' %}"
                       class="btn btn-sm btn-outline-secondary">
                        📊 Dashboard
                    </a>
                {% endif %}

                <!-- Settings -->
                <div class="dropdown">
                    <button class="btn btn-sm btn-outline-warning dropdown-toggle"
                            data-bs-toggle="dropdown">
                        ⚙ Settings
                    </button>

                    <ul class="dropdown-menu dropdown-menu-end">

                        <li>
                            <button onclick="toggleMode()" class="dropdown-item">
                                🌙 / ☀ Toggle Mode
                            </button>
                        </li>

                        <li><hr class="dropdown-divider"></li>

                        <li>
                            <form method="POST" action="{% url 'delete_account' %}">
                                {% csrf_token %}
                                <button type="submit"
                                        class="dropdown-item text-danger"
                                        onclick="return confirm('Delete your account permanently?')">
                                    🗑 Delete Account
                                </button>
                            </form>
                        </li>

                        <li>
                            <a class="dropdown-item text-danger"
                               href="{% url 'logout' %}">
                                🚪 Logout
                            </a>
                        </li>

                    </ul>
                </div>

            </div>
            {% endif %}

        </div>
    </div>
</nav>

<!-- CONTENT -->
<div class="container mt-4">
    {% block content %}
    {% endblock %}
</div>

<!-- THEME SCRIPT -->
<script>
    function toggleMode() {
        const body = document.body;

        if (body.classList.contains("dark-mode")) {
            body.classList.remove("dark-mode");
            body.classList.add("light-mode");
            localStorage.setItem("theme", "light");
        } else {
            body.classList.remove("light-mode");
            body.classList.add("dark-mode");
            localStorage.setItem("theme", "dark");
        }
    }

    window.onload = function() {
        const savedTheme = localStorage.getItem("theme");

        if (savedTheme === "light") {
            document.body.classList.remove("dark-mode");
            document.body.classList.add("light-mode");
        }
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
